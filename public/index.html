<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InvoiceFlow — Get paid faster</title>
  <meta name="description" content="Create professional invoices, share them with a link, and track who's paid — in seconds." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { DEFAULT: '#4f46e5', dark: '#4338ca', light: '#eef2ff' } } } }
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    [x-cloak] { display: none; }
    .fade-in { animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app"></div>
  <div id="toast" class="fixed bottom-5 right-5 z-50 space-y-2"></div>
  <script src="/app.js"></script>
</body>
</html>
